spring:
  application:
    name: bidmatch

  datasource:
    url: jdbc:h2:mem:bidmatch;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080
  servlet:
    session:
      timeout: 30m
      cookie:
        name: BIDMATCH_SESSION
        http-only: true
        secure: false
        same-site: lax

# 로깅
logging:
  level:
    root: INFO
    com.project.bidmatch: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
